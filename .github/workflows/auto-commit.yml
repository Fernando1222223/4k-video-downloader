name: Update README

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update date
        run: |
          DATETIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          cat > docs/LAST_UPDATED.md << EOF
          # Repository Status

          | | |
          |---|---|
          | **Last checked** | ${DATETIME} |
          | **Status** | Active |
          | **Latest version** | v3.0.0 |
          | **Windows** | 10 / 11 |
          EOF

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/LAST_UPDATED.md
          git commit -m "docs: update status $(date -u '+%Y-%m-%d')"
          git push
